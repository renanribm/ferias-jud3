<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0eeea;
  --border:rgba(0,0,0,.10);--border-md:rgba(0,0,0,.18);
  --text:#1a1a18;--text-2:#5a5a56;--text-3:#9a9a94;
  --accent:#1a1a18;
  --green:#1a7a4a;--green-bg:#e8f5ee;
  --blue:#1a4a8a;--blue-bg:#e8f0fa;
  --amber:#8a5a0a;--amber-bg:#faf0d8;
  --red:#8a1a1a;--red-bg:#fae8e8;
  --yellow:#7a6a00;--yellow-bg:#faf8d0;
  --admin-accent:#1a3a6a;--sim-accent:#3a6a1a;
  --r:10px;--r-sm:6px;
}
.preview-banner{position:sticky;top:0;z-index:100;background:#1a1a18;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-radius:0 0 var(--r) var(--r);margin:-24px -20px 20px;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.preview-banner-info{display:flex;flex-direction:column;gap:2px}
.preview-banner-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.preview-banner-sub{font-size:12px;opacity:.7}
.preview-banner-conflict{color:#fbbf24;font-weight:600}
.preview-banner-ok{color:#6ee7b7}
.preview-banner-actions{display:flex;gap:8px;align-items:center}
.btn-preview-confirm{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-sm);border:none;background:#fff;color:#1a1a18;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.btn-preview-confirm:hover{background:#f0f0f0}
.btn-preview-cancel{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.btn-preview-cancel:hover{background:rgba(255,255,255,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
@media(max-width:640px){.app{padding:16px 10px 80px}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.logo-text{font-size:16px;font-weight:600;letter-spacing:-.01em}
.logo-sub{font-size:12px;color:var(--text-3)}
.topbar-right{display:flex;align-items:center;gap:8px} .btn-mobile-show{display:none}
.mode-switcher{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.mswitch-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:16px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-3);background:transparent;transition:all .15s}
.mswitch-btn:hover{color:var(--text-2)}
.mswitch-btn.active.sim{background:var(--surface);color:var(--sim-accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.mswitch-btn.active.adm{background:var(--surface);color:var(--admin-accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.mswitch-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.5}
.mswitch-btn.active .mswitch-dot{opacity:1}
.sim-dot{background:var(--sim-accent)}
.adm-dot{background:var(--admin-accent)}
.sim-banner{background:#f0f7ea;border:1px solid #b8dba8;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--sim-accent);display:flex;align-items:flex-start;gap:8px}
.adm-banner{background:#edf2fb;border:1px solid #b8cef0;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--admin-accent);display:flex;align-items:flex-start;gap:8px}
.sim-banner svg,.adm-banner svg{flex-shrink:0;margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;font-weight:400;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
.btn.primary:hover{background:#2a2a28}
.btn.danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.btn.export{background:#e8f5ee;color:var(--green);border-color:transparent}
.btn.sm{padding:4px 10px;font-size:12px}
.welcome-banner{background:var(--blue-bg);border:1px solid #b8cef0;border-radius:var(--r-sm);padding:11px 16px;margin-bottom:16px;font-size:13px;color:var(--blue);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.welcome-banner-text{display:flex;align-items:center;gap:8px}
.welcome-banner-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.fab{position:fixed;bottom:28px;right:24px;z-index:500;display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:background .12s}
.fab:hover{background:#2a2a28}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:600;background:#1a1a18;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 20px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity .3s ease;pointer-events:none}
.toast.show{opacity:1}
.year-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.ytab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;color:var(--text-2);background:var(--surface);font-family:'DM Sans',sans-serif;transition:all .12s}
.ytab:hover{border-color:var(--border-md);color:var(--text)}
.ytab.active{background:var(--accent);color:#fff;border-color:transparent;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.card-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.card-val{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.card-sub{font-size:11px;color:var(--text-3);margin-top:3px}
.card.ok .card-val{color:var(--green)}
.card.warn .card-val{color:var(--amber)}
.card.danger .card-val{color:var(--red)}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.view-tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.vtab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text-2);background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;margin-bottom:-1px;transition:all .12s;white-space:nowrap}
.vtab:hover{color:var(--text)}
.vtab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.vtab.conflict-tab.active{color:var(--red);border-bottom-color:var(--red)}
.vtab.conflict-tab:not(.active){color:var(--amber)}
.vtab.config-tab{color:var(--text-3)}
.vtab.config-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.month-label{font-size:16px;font-weight:600;min-width:170px;text-align:center;letter-spacing:-.01em}
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#faf9f7}
.cal-head span{padding:8px 0;text-align:center;font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day{min-height:66px;padding:6px 6px 4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;flex-direction:column}
.day:nth-child(7n){border-right:none}
.day.empty{background:#faf9f7;cursor:default}
.day.weekend{background:#faf9f7}
.day.day-preview{background:#fef9c3;box-shadow:inset 0 0 0 2px #eab308}
.day.day-preview-conflict{background:#fee2e2;box-shadow:inset 0 0 0 2px #dc2626}
.day.rec-day{background:#fff1f2}
.day.search-match{background:#fef9c3;box-shadow:inset 0 0 0 2px #eab308}
.day.hl-vac{background:#fefce8 !important;box-shadow:inset 0 0 0 2px #eab308;transition:background .6s ease,box-shadow .6s ease}
.day.hl-vac-out{background:transparent !important;box-shadow:inset 0 0 0 0px #eab308;transition:background 1s ease,box-shadow 1s ease}
.day:not(.empty):hover{background:#f5f5f0}
.dn{font-size:12px;font-weight:500;color:var(--text-3);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;align-self:flex-end}
.day.today .dn{background:var(--accent);color:#fff;border-radius:50%}
.day-content{flex:1;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start}
.cbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:600;border-radius:3px;padding:1px 5px;margin-bottom:2px}
.cb1{background:var(--green-bg);color:var(--green)}
.cb2{background:var(--blue-bg);color:var(--blue)}
.cb3{background:var(--yellow-bg);color:var(--yellow)}
.cb4{background:var(--amber-bg);color:var(--amber)}
.cbover{background:var(--red-bg);color:var(--red)}
.dnames{font-size:9px;color:var(--text-3);line-height:1.4;word-break:break-word}
.sel-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:20px;font-size:13px;color:var(--text-2);min-height:42px;line-height:1.6}
.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto;margin-bottom:20px}
.gantt-inner{min-width:680px;padding:14px 16px}
.gantt-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.gname{width:90px;font-size:11px;color:var(--text-2);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtrack{flex:1;height:16px;position:relative;background:var(--surface2);border-radius:3px}
.gbar{position:absolute;height:12px;top:2px;border-radius:2px}
.mr{display:flex;margin-bottom:6px}
.mr-sp{width:98px;flex-shrink:0}
.mr-m{font-size:9px;color:var(--text-3);text-align:center;overflow:hidden}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.config-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:800px}
@media(max-width:640px){.config-grid{grid-template-columns:1fr}}
.pchip{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:border-color .12s,background .12s}
.pchip:hover{border-color:var(--border-md);background:var(--surface2)}
.pchip.mine{border:2px solid var(--accent);background:var(--surface)}
.pchip.mine .pname{font-weight:600}
.pchip.mine:hover{background:var(--surface2)}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pname{font-size:12px;font-weight:500}
.psub{font-size:10px;color:var(--text-3)}
.conflicts-wrap{margin-bottom:20px}
.conflict-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);text-align:center;gap:12px}
.conflict-ok-icon{width:52px;height:52px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:24px}
.conflict-empty-title{font-size:15px;font-weight:600;color:var(--green)}
.conflict-empty-sub{font-size:13px;color:var(--text-3)}
.conflict-month-block{margin-bottom:20px}
.conflict-month-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.conflict-item{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px}
.conflict-date-col{min-width:80px;flex-shrink:0}
.conflict-day-num{font-size:28px;font-weight:600;letter-spacing:-.03em;color:var(--red);line-height:1}
.conflict-weekday{font-size:11px;color:var(--text-3);margin-top:2px}
.conflict-body{flex:1}
.conflict-count-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red-bg);color:var(--red);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-bottom:7px}
.conflict-names{display:flex;flex-wrap:wrap;gap:5px}
.conflict-name-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .12s}
.conflict-name-chip:hover{border-color:var(--border-md)}
.conflict-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.conflict-summary-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px;background:var(--red-bg);border-radius:var(--r-sm);border:1px solid rgba(138,26,26,.12)}
.csb-item{font-size:13px;color:var(--red)}
.csb-val{font-weight:600}
.statusbar{font-size:11px;color:var(--text-3);margin-top:4px}
.day.has-hol{border-left:3px solid #7c3aed;padding-left:4px}
.day-top{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.hbadge{display:inline-block;font-size:7px;color:#7c3aed;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 30px);border:1px solid #7c3aed;border-radius:4px;padding:1px 4px;opacity:.7}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,8,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r);padding:0;width:440px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;letter-spacing:-.01em}
.modal-body{padding:24px 24px 0;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px 20px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-2);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;padding:8px 12px;border:1px solid var(--border-md);border-radius:var(--r-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.vac-list{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.vac-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;background:var(--surface2);border-radius:var(--r-sm);font-size:12px}
.vac-dates{font-weight:500;color:var(--text)}
.vac-days{color:var(--text-3)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.notice{background:var(--amber-bg);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--amber);margin-top:10px}
.pin-error{color:var(--red);font-size:12px;min-height:18px;margin-bottom:8px}
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99999;padding:24px}
.login-box{background:var(--surface);border:1px solid var(--border-md);border-radius:16px;padding:40px 36px;width:380px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,.10);display:flex;flex-direction:column;align-items:center}
.login-mark{width:52px;height:52px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;margin-bottom:20px}
.login-title{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:var(--text-3);margin-bottom:28px;text-align:center}
.login-field{width:100%;margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.login-field input{width:100%;padding:10px 14px;border:1px solid var(--border-md);border-radius:var(--r-sm);font-size:14px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;letter-spacing:.12em;-webkit-appearance:none;appearance:none}
.login-field input:focus{outline:none;border-color:var(--accent)}
.login-error{font-size:12px;color:var(--red);min-height:18px;margin-bottom:12px;text-align:center}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
.login-footer{font-size:11px;color:var(--text-3);margin-top:20px;text-align:center}

// ── Holidays ───────────────────────────────────────────────────────────────────
function calcEaster(y){
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
      f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
      h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
      l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
      mo=Math.floor((h+l-7*m+114)/31),
      dy=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,dy);
}
function easterPlus(y,n){var d=calcEaster(y);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fixedDate(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function dateShift(ds,n){var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function buildHolidayMap(y){
  var map={};
  function add(ds,label,type){if(ds&&!map[ds])map[ds]={label:label,type:type};}

  // Fixed national/state/municipal holidays
  var fixedHols=[
    [1,1,'Confraternização Universal'],
    [1,25,'Aniversário de São Paulo'],
    [4,21,'Tiradentes'],
    [5,1,'Dia Mundial do Trabalho'],
    [7,9,'Data Magna do Estado de SP'],
    [9,7,'Independência do Brasil'],
    [10,12,'Nossa Senhora Aparecida'],
    [11,2,'Finados'],
    [11,15,'Proclamação da República'],
    [11,20,'Consciência Negra'],
    [12,25,'Natal']
  ];
  fixedHols.forEach(function(f){add(fixedDate(y,f[0],f[1]),f[2],'holiday');});

  // Mobile holidays
  var paixao=easterPlus(y,-2);
  var corpus=easterPlus(y,60);
  add(paixao,'Paixão de Cristo','holiday');
  add(corpus,'Corpus Christi','holiday');

  // Carnival (pontos facultativos)
  add(easterPlus(y,-48),'Carnaval — Segunda-feira','optional');
  add(easterPlus(y,-47),'Carnaval — Terça-feira','optional');
  add(easterPlus(y,-46),'Quarta-feira de Cinzas (até 12h)','optional');

  // Fixed pontos facultativos
  add(fixedDate(y,10,30),'Dia do Servidor Público','optional');
  add(fixedDate(y,12,24),'Véspera de Natal','optional');
  add(fixedDate(y,12,31),'Véspera de Ano-Novo','optional');

  // Suspensions: bridge days — only when holiday falls on Thu (bridge Fri) or Tue (bridge Mon)
  // Collect all holidays to check
  var allHolDates=[];
  fixedHols.forEach(function(f){allHolDates.push(fixedDate(y,f[0],f[1]));});
  allHolDates.push(paixao);
  allHolDates.push(corpus);

  allHolDates.forEach(function(ds){
    var dow=new Date(ds+'T00:00:00').getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
    if(dow===4){add(dateShift(ds,1),'Suspensão de Expediente','suspended');}  // Thu -> bridge Fri
    if(dow===2){add(dateShift(ds,-1),'Suspensão de Expediente','suspended');} // Tue -> bridge Mon
  });

  return map;
}

function buildDayMap(year){
  var m={};
  vacations.forEach(function(v){
    if(isLicense(v))return;
    for(var i=0;i<v.d;i++){
      var k=fmt(addDays(v.s,i));
      if(k.slice(0,4)!==String(year))continue;
      if(!m[k])m[k]=[];
      m[k].push(v.n);
    }
  });
  return m;
}

      if(k.slice(0,4)!==String(year))continue;

    }
  });

function buildRecessoDateSet(year){
  var s={};
  var dates=recessoDates[year]||{};
  function fillRange(s0,e0){
    if(!s0||!e0)return;
    var cur=s0;
    while(cur<=e0){s[cur]=true;var d=new Date(cur+'T00:00:00');d.setDate(d.getDate()+1);cur=fmt(d);}
  }
  fillRange(dates.natal_s,dates.natal_e);
  fillRange(dates.ano_novo_s,dates.ano_novo_e);
  return s;
}
function buildRecessoDayMap(year){
  var m={};
  var choices=recessoChoices[year]||{};
  var dates=recessoDates[year]||{};
  var active=activePeopleForYear(year);
  var grupo1=active.filter(function(p){return choices[p]==='ano_novo';});
  var grupo2=active.filter(function(p){return choices[p]==='natal';});
  function fillRange(s,e,people){
    if(!s||!e||!people.length)return;
    var cur=s;
    while(cur<=e){
      if(!m[cur])m[cur]=[];
      people.forEach(function(n){if(m[cur].indexOf(n)<0)m[cur].push(n);});
      var d=new Date(cur+'T00:00:00');d.setDate(d.getDate()+1);cur=fmt(d);
    }
  }
  fillRange(dates.natal_s,dates.natal_e,grupo2);
  fillRange(dates.ano_novo_s,dates.ano_novo_e,grupo1);
  return m;
}

function getStats(year){
  var dm=buildDayMap(year);
  var maxS=0,dOver=0,dAt4=0,totalD=0;
  Object.keys(dm).forEach(function(k){
    var ns=dm[k];
    if(ns.length>maxS)maxS=ns.length;
    if(ns.length>LIMIT)dOver++;
    if(ns.length===LIMIT)dAt4++;
  });
  vacations.forEach(function(v){
    if(isLicense(v))return;
    var ys=v.s.slice(0,4),ye=fmt(addDays(v.s,v.d-1)).slice(0,4);
    if(ys===String(year)||ye===String(year))totalD+=v.d;
  });
  var daysWithVac=Object.keys(dm).length;
  return{maxS:maxS,dOver:dOver,dAt4:dAt4,totalD:totalD,daysWithVac:daysWithVac};
}

function saveOfficial(toastMsg){
  if(!toastMsg)toastMsg='✓ Alteração salva com sucesso';
  statusMsg='Salvando...';renderStatus();
  var now=new Date();
  var savedBy=currentAdminUser||'ADMIN';
  var snapshot={
    vacations:JSON.stringify(vacations),
    people:JSON.stringify(people),
    savedAt:now.toISOString(),
    savedBy:savedBy
  };
  // Push to history before overwriting
  _histRef.get().then(function(snap){
    var hist=[];
    if(snap.exists&&snap.data().snapshots){try{hist=JSON.parse(snap.data().snapshots);}catch(e){hist=[];}}
    // Read current official to snapshot PREVIOUS state (what is being replaced)

function migratePeople(raw){
  if(!raw||!raw.length)return DEFAULT_PEOPLE.map(function(p){return Object.assign({},p);});

    if(typeof p==='string')return {n:p,desde:YEARS[0],ate:null};

  });
}
function applyData(src){
  vacations=src.vacations.map(function(v){return Object.assign({},v);});

// Returns names of people active in a given year
function pDesdeYear(p){return typeof p.desde==='number'?p.desde:parseInt((p.desde||'').slice(0,4));}
function pAteYear(p){return p.ate===null?null:(typeof p.ate==='number'?p.ate:parseInt(p.ate.slice(0,4)));}
function pDesdeDate(p){return typeof p.desde==='number'?p.desde+'-01-01':p.desde;}
function pAteDate(p){return p.ate===null?null:(typeof p.ate==='number'?p.ate+'-12-31':p.ate);}
function fmtPersonDate(val){if(!val)return '';return typeof val==='number'?String(val):fmtBR(val);}
function activePeopleForYear(year){
  return people.filter(function(p){
    var dy=pDesdeYear(p),ay=pAteYear(p);
    return dy<=year&&(ay===null||ay>=year);
  }).map(function(p){return p.n;});
}
function activePeopleForMonth(year,month){
  var mStart=year+'-'+String(month+1).padStart(2,'0')+'-01';
  var mEnd=fmt(new Date(year,month+1,0));
  return people.filter(function(p){
    var dd=pDesdeDate(p),ad=pAteDate(p);
    return dd<=mEnd&&(ad===null||ad>=mStart);
  }).map(function(p){return p.n;});
}
function activePeopleForDay(ds){
  return people.filter(function(p){
    var dd=pDesdeDate(p),ad=pAteDate(p);
    return dd<=ds&&(ad===null||ad>=ds);
  }).map(function(p){return p.n;});
}

window.setSub=function(monthKey,dateStr,from,to){
  if(!isMaster())return;
  if(!subsData[monthKey])subsData[monthKey]={};
  if(!subsData[monthKey][dateStr])subsData[monthKey][dateStr]={};
  var day=subsData[monthKey][dateStr];
  if(!day._m)day._m=[];
  if(to){
    day[from]=to;
    if(day._m.indexOf(from)<0)day._m.push(from);
  }else{
    delete day[from];
    var mi=day._m.indexOf(from);
    if(mi>=0)day._m.splice(mi,1);
  }

};
function getMonthAbsences(year,month){
  var result={};
  var dim=new Date(year,month+1,0).getDate();
  var mo=String(month+1).padStart(2,'0');
  for(var d=1;d<=dim;d++){
    var ds=year+'-'+mo+'-'+String(d).padStart(2,'0');
    if(!isWorkDayForBanca(ds))continue;
    var absent=[];
    vacations.forEach(function(v){
      var endD=fmt(addDays(v.s,v.d-1));
      if(ds>=v.s&&ds<=endD)absent.push({n:v.n,type:v.type||'ferias'});
    });
    absent.sort(function(a,b){return a.n.localeCompare(b.n);});
    if(absent.length)result[ds]=absent;
  }
  return result;
}
// ── Geração automática de substituições ────────────────────────────────────────
// startingPoints: { "PERSON": "LAST_SUB_FROM_PREV_MONTH" }
function generateSubsMonth(year,month,fabianaSub,startingPoints){
  var monthKey=year+'-'+String(month+1).padStart(2,'0');
  var existing=subsData[monthKey]||{};
  var manualOverrides={};
  Object.keys(existing).forEach(function(k){
    if(!/^\d{4}-\d{2}-\d{2}$/.test(k))return;
    var day=existing[k];var manuals=day._m||[];
    if(manuals.length){manualOverrides[k]={};manuals.forEach(function(n){if(day[n])manualOverrides[k][n]=day[n];});}
  });
  var absencesByDay=getMonthAbsences(year,month);
  var queue=getSubsQueue(year,month);
  var days=Object.keys(absencesByDay).sort();
  var N=queue.length;
  var pointers={};
  var chefeN=getChefe();
  var newData={fabianaFixedSub:fabianaSub||existing.fabianaFixedSub||null};
  days.forEach(function(ds){
    var active=activePeopleForDay(ds);
    var absents=absencesByDay[ds];
    var absentNames=absents.map(function(a){return a.n;});
    var available=active.filter(function(n){return absentNames.indexOf(n)<0;});
    var dayResult={};var manuals=[];
    var manDay=manualOverrides[ds]||{};
    Object.keys(manDay).forEach(function(name){
      if(absentNames.indexOf(name)>=0){
        var sub=manDay[name];
        dayResult[name]=sub;manuals.push(name);
        available=available.filter(function(n){return n!==sub;});
      }
    });
    if(chefeN&&fabianaSub&&absentNames.indexOf(chefeN)>=0&&!dayResult[chefeN]){
      if(available.indexOf(fabianaSub)>=0){
        dayResult[chefeN]=fabianaSub;
        available=available.filter(function(n){return n!==fabianaSub;});
      }
    }
    var remaining=absents.filter(function(a){return !dayResult[a.n]&&a.n!==chefeN;});
    remaining.sort(function(a,b){
      var ia=queue.indexOf(a.n);var ib=queue.indexOf(b.n);
      return(ia<0?999:ia)-(ib<0?999:ib);
    });
    remaining.forEach(function(absent){
      var n=absent.n;
      var qIdx=queue.indexOf(n);if(qIdx<0)qIdx=0;
      if(pointers[n]===undefined){
        var sp=startingPoints&&startingPoints[n];
        if(sp){var spIdx=queue.indexOf(sp);pointers[n]=spIdx>=0?(spIdx+1)%N:(qIdx+1)%N;}
        else{pointers[n]=(qIdx+1)%N;}
      }
      for(var j=0;j<N;j++){
        var cidx=(pointers[n]+j)%N;
        var candidate=queue[cidx];
        if(candidate!==n&&available.indexOf(candidate)>=0){
          dayResult[n]=candidate;
          available=available.filter(function(x){return x!==candidate;});
          pointers[n]=(cidx+1)%N;
          break;
        }
      }
    });
    newData[ds]=dayResult;
    if(manuals.length)newData[ds]._m=manuals;
  });
  subsData[monthKey]=newData;
  saveSubs();
}
// Retorna o último substituto registrado para person nos meses anteriores
function getLastSubFromPrevMonth(person,year,month){
  for(var i=1;i<=4;i++){
    var pm=month-i;var py=year;
    while(pm<0){pm+=12;py--;}
    var pk=py+'-'+String(pm+1).padStart(2,'0');
    var prev=subsData[pk];if(!prev)continue;
    var dates=Object.keys(prev).filter(function(k){return /^\d{4}-\d{2}-\d{2}$/.test(k)&&prev[k][person];}).sort();
    if(dates.length)return prev[dates[dates.length-1]][person];
  }
  return null;
}
// Retorna { auto: {person:lastSub}, needsInput: [person] } para ausentes cross-month (exceto Fabiana)
function getCrossMonthData(year,month){
  var mo=String(month+1).padStart(2,'0');
  var monthFirst=year+'-'+mo+'-01';
  var absences=getMonthAbsences(year,month);
  var seen={};var auto={};var needsInput=[];
  var chefeN=getChefe();
  Object.keys(absences).forEach(function(ds){
    absences[ds].forEach(function(a){
      var n=a.n;
      if(n===chefeN||seen[n])return;
      seen[n]=true;
      var isCross=vacations.some(function(v){
        return v.n===n&&v.s<monthFirst&&fmt(addDays(v.s,v.d-1))>=monthFirst;
      });
      if(!isCross)return;
      var last=getLastSubFromPrevMonth(n,year,month);
      if(last)auto[n]=last;
      else needsInput.push(n);
    });
  });
  return{auto:auto,needsInput:needsInput};
}

function getFabianaCrossMonthSub(year,month){
  var chefeN=getChefe();
  var mo=String(month+1).padStart(2,'0');
  var monthFirst=year+'-'+mo+'-01';
  var cross=null;
  vacations.forEach(function(v){
    if(v.n!==chefeN)return;
    var endD=fmt(addDays(v.s,v.d-1));
    if(v.s<monthFirst&&endD>=monthFirst)cross=v;
  });
  if(!cross)return null;
  for(var i=1;i<=4;i++){
    var pm=month-i;var py=year;
    while(pm<0){pm+=12;py--;}
    var pk=py+'-'+String(pm+1).padStart(2,'0');
    if(subsData[pk]&&subsData[pk].fabianaFixedSub)return{sub:subsData[pk].fabianaFixedSub,periodStart:cross.s};
  }
  return null;
}
function _fabianaAvail(year,month){
  var chefeN=getChefe();
  var absences=getMonthAbsences(year,month);
  var fabDays=Object.keys(absences).filter(function(ds){return absences[ds].some(function(a){return a.n===chefeN;});});
  return activePeopleForMonth(year,month).filter(function(n){
    if(n===chefeN)return false;
    return fabDays.every(function(ds){return!absences[ds].some(function(a){return a.n===n;});});
  });
}

window.generateSubs=function(year,month){
  if(!isMaster())return;
  var chefeN=getChefe();
  var absences=getMonthAbsences(year,month);
  var fabAbsent=false;
  Object.keys(absences).forEach(function(ds){if(absences[ds].some(function(a){return a.n===chefeN;}))fabAbsent=true;});
  var crossData=getCrossMonthData(year,month);
  function doGenerate(fabianaSub,startingPoints){
    generateSubsMonth(year,month,fabianaSub,startingPoints);render();showToast('✓ Tabela gerada');
  }
  function afterStartingPoints(startingPoints){
    if(fabAbsent){showFabianaSubModal(year,month,function(fab){doGenerate(fab,startingPoints);});}
    else{doGenerate(null,startingPoints);}
  }
  if(crossData.needsInput.length>0){
    var prevMo=month>0?month-1:11;var prevYr=month>0?year:year-1;
    showStartingPointsModal(crossData.needsInput,function(inputs){
      var sp=Object.assign({},crossData.auto,inputs);
      afterStartingPoints(sp);
    },prevYr,prevMo);
  }else{
    afterStartingPoints(crossData.auto);
  }
};

  var h='';

window.printSubs=function(year,month){

  var firstDay=new Date(year,month,1);

  var backDays=dowFirst===0?6:dowFirst-1;
  var weekStart=new Date(firstDay);
  weekStart.setDate(weekStart.getDate()-backDays);
  var weeks=[];
  var cur=new Date(weekStart);
  while(cur<=lastDay){
    var weekFri=new Date(cur);weekFri.setDate(weekFri.getDate()+4);
    if(weekFri>=firstDay){
      var week=[];
      for(var di=0;di<5;di++){
        var cd=new Date(cur);cd.setDate(cd.getDate()+di);
        week.push({ds:fmt(cd),dayNum:cd.getDate(),inMonth:cd.getMonth()===month});
      }

    week.forEach(function(cell){
      if(!cell.inMonth){rows+='<td style="background:#f5f5f5"></td>';return;}
      var da=monthAssignments[cell.ds]||{};
      var abs=absences[cell.ds]||[];
      var hol=getHoliday(cell.ds);
      var isOff=hol&&(hol.type==='holiday'||hol.type==='suspended'||(hol.type==='optional'&&!(hol.label&&hol.label.indexOf('Cinzas')>=0)));

      abs.forEach(function(absent){
        var sub=da[absent.n]||'—';
        rows+='<div style="font-size:10px;margin-bottom:3px"><span style="color:#999">'+absent.n+'</span> → <strong>'+sub+'</strong></div>';
      });
      rows+='</td>';
    });
    rows+='</tr>';
  });
  // Build absence summary
  var mo2=String(month+1).padStart(2,'0');
  var monthFirst=year+'-'+mo2+'-01';
  var monthLast=year+'-'+mo2+'-'+String(new Date(year,month+1,0).getDate()).padStart(2,'0');
  var byPerson={};

    byPerson[v.n].push(v);
  });
  var summaryLines=Object.keys(byPerson).sort().map(function(n){
    var parts=byPerson[n].slice().sort(function(a,b){return a.s.localeCompare(b.s);}).map(function(v){
      var typeStr=(!v.type||v.type==='ferias')?'férias':licenseLabel(v.type).toLowerCase();
      var br=fmtBR(v.s);
      return v.d+' dias de '+typeStr+' a partir de '+br.slice(0,6)+br.slice(8);
    });
    return '— '+n+': '+parts.join(' e ');
  });
  var summary=summaryLines.length?
    '<div style="margin-top:24px;border-top:1px solid #ddd;padding-top:16px">'+
    '<p style="font-size:12px;font-weight:600;margin-bottom:8px">Ausências em '+MONTHS_PT[month]+' '+year+'</p>'+
    summaryLines.map(function(l){return '<p style="font-size:11px;margin:3px 0">'+l+'</p>';}).join('')+
    '</div>':'';
  var colStyle='th{background:#e8e8e8;font-weight:600;padding:8px;text-align:center;font-size:12px;width:20%}';
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Substituições JUD-3 — '+MONTHS_PT[month]+' '+year+'</title>'+
    '<style>*{-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:Arial,sans-serif;font-size:12px;padding:20px}h2{font-size:15px;margin-bottom:14px}'+

// ── History ────────────────────────────────────────────────────────────────────
function diffSnapshots(curr, prev){
  // curr and prev are {vacations: [...], people: [...]}
  var lines=[];
  var currVacs=JSON.parse(curr.vacations);
  var prevVacs=prev?JSON.parse(prev.vacations):[];
  var currPeople=migratePeople(JSON.parse(curr.people));
  var prevPeople=prev?migratePeople(JSON.parse(prev.people)):[];

  // Vacation key for comparison
  function vacKey(v){return v.n+'|'+v.s+'|'+v.d+'|'+(v.type||'ferias');}
  var currKeys=currVacs.map(vacKey);
  var prevKeys=prevVacs.map(vacKey);

  currVacs.forEach(function(v){
    if(prevKeys.indexOf(vacKey(v))<0){
      var lbl=(!v.type||v.type==='ferias')?'Férias adicionadas':licenseLabel(v.type)+' registrada';
      lines.push({type:'add',text:'+ '+lbl+': '+v.n+' ('+fmtBR(v.s)+', '+v.d+' dias)'});
    }
  });
  prevVacs.forEach(function(v){
    if(currKeys.indexOf(vacKey(v))<0){
      var lbl=(!v.type||v.type==='ferias')?'Férias removidas':licenseLabel(v.type)+' removida';
      lines.push({type:'rem',text:'− '+lbl+': '+v.n+' ('+fmtBR(v.s)+', '+v.d+' dias)'});
    }
  });

  // People changes
  var currNames=currPeople.map(function(p){return p.n;});
  var prevNames=prevPeople.map(function(p){return p.n;});
  currPeople.forEach(function(p){
    if(prevNames.indexOf(p.n)<0)
      lines.push({type:'add',text:'+ Procurador adicionado: '+p.n});
  });
  prevPeople.forEach(function(p){
    if(currNames.indexOf(p.n)<0)
      lines.push({type:'rem',text:'− Procurador removido: '+p.n});
  });
  // Status changes (active/inactive)
  currPeople.forEach(function(cp){
    var pp=prevPeople.find(function(x){return x.n===cp.n;});
    if(pp){
      if(pp.ate!==cp.ate){
        if(cp.ate!==null&&pp.ate===null)
          lines.push({type:'rem',text:'− '+cp.n+' desativado (saída: '+fmtPersonDate(cp.ate)+')'});
        if(cp.ate===null&&pp.ate!==null)
          lines.push({type:'add',text:'+ '+cp.n+' reativado'});
      }
    }
  });

  if(!lines.length)lines.push({type:'neutral',text:'Nenhuma alteração detectada'});
  return lines;
}

function showHistoryModal(){
  openTallModal(
    '<h3>Histórico de versões</h3><div id="hist-body" style="font-size:13px;color:var(--text-3);padding:8px 0">Carregando...</div>',

  );
  _histRef.get().then(function(snap){
    var el=document.getElementById('hist-body');if(!el)return;
    var hist=[];
    if(snap.exists&&snap.data().snapshots){try{hist=JSON.parse(snap.data().snapshots);}catch(e){hist=[];}}
    if(!hist.length){
      el.innerHTML='<span style="color:var(--text-3)">Nenhuma versão anterior encontrada.</span>';
      return;
    }
    // Build rows — compare each snapshot to the next one (which is older)
    var rows=hist.map(function(s,i){
      var dt=s.savedAt?new Date(s.savedAt).toLocaleString('pt-BR'):'—';
      var by=s.savedBy||'—';
      var next=hist[i+1]||null; // older snapshot to compare against
      var diffs=diffSnapshots(s,next);
      var diffColor={add:'var(--green)',rem:'var(--red)',neutral:'var(--text-3)'};
      var diffHtml=diffs.map(function(d){
        return '<div style="font-size:11px;color:'+diffColor[d.type]+';padding:1px 0">'+d.text+'</div>';
      }).join('');
      return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'+
        '<div>'+

        '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Salvo por: <strong>'+by+'</strong></div>'+
        '</div>'+
        '<button class="btn sm" onclick="confirmRestore('+i+')">Restaurar</button>'+

        '<div style="margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--r-sm)">'+diffHtml+'</div>'+

    }).join('');
    el.innerHTML=rows;
  }).catch(function(){
    var el=document.getElementById('hist-body');
    if(el)el.innerHTML='Erro ao carregar histórico.';
  });
}

// ── Login ──────────────────────────────────────────────────────────────────────
function checkLogin(){
  var input=document.getElementById('login-input');
  var err=document.getElementById('login-error');
  var val=input.value.trim();
  var normalize=function(s){return s.normalize?s.normalize('NFD').replace(/[\u0300-\u036f]/g,''):s;};
  var normVal=normalize(val);
  var matched=null;
  if(val===OFFICIAL_PIN){matched='ADMIN';}
  else if(val===ACCESS_PASSWORD){matched='VIEWER';}
  else{
    // Match against known people (DEFAULT_PEOPLE as fallback, then live Firestore list)
    DEFAULT_PEOPLE.forEach(function(p){if(normVal===normalize(p.n))matched=p.n;});
    if(!matched)people.forEach(function(p){if(normVal===normalize(p.n))matched=p.n;});
  }
  if(matched){
    sessionStorage.setItem(SESSION_KEY,matched);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='';
    err.textContent='';
    bootDashboard(matched);
  }else{
    err.textContent='Senha incorreta. Tente novamente.';
    input.value='';input.focus();
  }
}

function confirmPreview(){
  if(!previewVac)return;
  var pv=previewVac;
  // Check conflicts
  var tmpVacs=vacations.concat([{n:pv.n,s:pv.s,d:pv.d}]);
  var tmpMap={};
  tmpVacs.forEach(function(v){for(var i=0;i<v.d;i++){var k=fmt(addDays(v.s,i));if(!tmpMap[k])tmpMap[k]=[];tmpMap[k].push(v.n);}});
  var over=false;
  for(var i=0;i<pv.d;i++){var k=fmt(addDays(pv.s,i));if((tmpMap[k]||[]).length>LIMIT){over=true;break;}}
  function _proceed(){previewVac=null;adminConfirm(function(){vacations.push({n:pv.n,s:pv.s,d:pv.d});saveData();render();});}
  if(over){
    openModal('<h3>Atenção</h3>'+
      '<p style="font-size:13px;color:var(--text-2);margin:10px 0 20px">Este período resulta em mais de <strong>'+LIMIT+'</strong> procuradores ausentes simultaneamente. Confirmar mesmo assim?</p>'+
      '<div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn danger" onclick="closeModal();window._overLimitCb()">Confirmar mesmo assim</button></div>');
    window._overLimitCb=_proceed;
  }else{_proceed();}
}

    '<div class="pwd-wrap"><input type="password" id="adm-confirm-pwd" placeholder="********" autocomplete="off" style="letter-spacing:.1em"><button class="pwd-toggle" type="button" onclick="togglePwd(\'adm-confirm-pwd\',this)" tabindex="-1">Exibir</button></div></div>'+

  );
  setTimeout(function(){var el=document.getElementById('adm-confirm-pwd');if(el)el.focus();},80);
  window._adminCb=cb;
  window._adminConfirmCheck=function(){
    var input=document.getElementById('adm-confirm-pwd');
    var val=input?input.value.trim():'';
    var normalize=function(s){return s.normalize?s.normalize('NFD').replace(/[\u0300-\u036f]/g,''):s;};
    var expected=currentAdminUser||'ADMIN';
    var ok=(expected==='ADMIN'&&val===OFFICIAL_PIN)||(normalize(val)===normalize(expected));
    if(ok){closeModal();window._adminCb();}
    else{
      var err=document.getElementById('adm-confirm-err');
      if(err)err.textContent='Senha incorreta. Use a mesma senha utilizada no login.';
      if(input){input.value='';input.focus();}
    }
  };
  setTimeout(function(){
    var el=document.getElementById('adm-confirm-pwd');
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter')window._adminConfirmCheck();});
  },90);
}

function hasPersonOverlap(person,start,days,excludeIdx){
  var newEnd=fmt(addDays(start,days-1));
  return vacations.some(function(v,i){
    if(v.n!==person)return false;
    if(excludeIdx!==undefined&&i===excludeIdx)return false;
    var vEnd=fmt(addDays(v.s,v.d-1));
    return start<=vEnd&&newEnd>=v.s;
  });
}
function confirmAddVac(){
  var person=document.getElementById('av-person').value;
  var start=document.getElementById('av-start').value;
  var days=parseInt(document.getElementById('av-days').value);
  if(!start||!days||days<1){alert('Preencha todos os campos.');return;}
  if(hasPersonOverlap(person,start,days)){alert('Este período se sobrepõe a um período já cadastrado para '+person+'.');return;}
  var tmpVacs=vacations.concat([{n:person,s:start,d:days}]);
  var tmpMap={};
  tmpVacs.forEach(function(v){for(var i=0;i<v.d;i++){var k=fmt(addDays(v.s,i));if(!tmpMap[k])tmpMap[k]=[];tmpMap[k].push(v.n);}});
  var over=false;
  for(var i=0;i<days;i++){var k=fmt(addDays(start,i));if((tmpMap[k]||[]).length>LIMIT){over=true;break;}}
  function _proceed(){closeModal();adminConfirm(function(){vacations.push({n:person,s:start,d:days});saveData();render();});}
  if(over){
    openModal('<h3>Atenção</h3>'+
      '<p style="font-size:13px;color:var(--text-2);margin:10px 0 20px">Este período resulta em mais de <strong>'+LIMIT+'</strong> procuradores ausentes simultaneamente. Confirmar mesmo assim?</p>'+
      '<div class="mbtns"><button class="btn" onclick="closeModal()">Cancelar</button>'+
      '<button class="btn danger" onclick="window._overLimitCb()">Confirmar mesmo assim</button></div>');
    window._overLimitCb=_proceed;
  }else{_proceed();}
}

function confirmEditPerson(name){
  var val=(document.getElementById('ep-fullname').value||'').trim().toUpperCase();
  var isChefia=document.getElementById('ep-chefia').checked;
  var p=people.find(function(x){return x.n===name;});
  var wasChefe=!!(p&&p.chefia);
  var currentChefe=getChefe();

  function doSave(){
    if(p){
      if(val)p.fullName=val;else delete p.fullName;
      if(isChefia){people.forEach(function(x){delete x.chefia;});p.chefia=true;}
      else{delete p.chefia;}
    }
    saveData('✓ Procurador atualizado');showPeopleManager();
  }

  // Transferência de chefia: outro procurador já é chefe
  if(isChefia&&!wasChefe&&currentChefe&&currentChefe!==name){
    window._doSaveEditPerson=doSave;
    openModal(
      '<h3>Transferir chefia</h3>'+
      '<p style="font-size:13px;color:var(--text-2);margin:10px 0 16px;line-height:1.6">A chefia está atualmente com <strong>'+currentChefe+'</strong>. Ao confirmar, ela será transferida para <strong>'+name+'</strong>.</p>'+
      '<div class="mbtns"><button class="btn" onclick="showPeopleManager()">Cancelar</button>'+
      '<button class="btn danger" onclick="closeModal();adminConfirm(window._doSaveEditPerson)">Transferir</button></div>'
    );
    return;
  }

  // Remoção de chefia sem substituto
  if(!isChefia&&wasChefe){
    window._doSaveEditPerson=doSave;
    openModal(
      '<h3>Remover chefia</h3>'+
      '<p style="font-size:13px;color:var(--text-2);margin:10px 0 4px;line-height:1.6">Nenhum procurador ficará designado como chefe da unidade.</p>'+
      '<p style="font-size:12px;color:var(--amber);margin:0 0 16px;line-height:1.6">&#9888; A lógica de substituto fixo deixará de funcionar até que uma nova chefia seja atribuída.</p>'+
      '<div class="mbtns"><button class="btn" onclick="showPeopleManager()">Cancelar</button>'+
      '<button class="btn danger" onclick="closeModal();adminConfirm(window._doSaveEditPerson)">Remover chefia</button></div>'
    );
    return;
  }

  adminConfirm(doSave);
}

window._confirmRemovePerson=function(name){
  var input=document.getElementById('remove-pwd');
  var val=input?input.value.trim():'';
  var expected=currentAdminUser||'ADMIN';
  var ok=(expected==='ADMIN'&&val===OFFICIAL_PIN)||(val===expected);
  if(!ok){
    var err=document.getElementById('remove-pwd-err');
    if(err)err.textContent='Senha incorreta. Use a mesma senha utilizada no login.';
    if(input){input.value='';input.focus();}
    return;
  }
  people=people.filter(function(p){return p.n!==name;});
  vacations=vacations.filter(function(v){return v.n!==name;});
  YEARS.forEach(function(y){if(recessoChoices[y])delete recessoChoices[y][name];});
  closeModal();saveData('✓ Procurador removido');saveRecesso();render();
};

// ── Substituições export date-range picker ──────────────────────────────────
var _subsExp={start:null,end:null,hover:null,calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),calOpen:false};

function _subsExpInit(){
  var now=new Date();
  _subsExp.start=fmt(new Date(now.getFullYear(),now.getMonth(),1));
  _subsExp.end=fmt(new Date(now.getFullYear(),now.getMonth()+1,0));
  _subsExp.hover=null;
  _subsExp.calYear=now.getFullYear();
  _subsExp.calMonth=now.getMonth();
  _subsExp.calOpen=false;
  _subsExpRender();
  setTimeout(function(){
    document.addEventListener('mousedown',function _sExpOutside(e){
      var el=document.getElementById('subs-exp-range');
      if(el&&!el.contains(e.target)){_subsExp.calOpen=false;_subsExpRenderCal();}
      else if(!el){document.removeEventListener('mousedown',_sExpOutside);}
    });
  },0);
}

function _subsExpRender(){
  var el=document.getElementById('subs-exp-range');
  if(!el)return;
  var fmtInput=function(ds){return ds?ds.slice(8,10)+'/'+ds.slice(5,7)+'/'+ds.slice(0,4):'';};
  var inputStyle='width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--r-sm);font-size:13px;font-family:\'DM Sans\',sans-serif;background:var(--surface);color:var(--text);cursor:pointer';
  el.innerHTML=
    '<div style="position:relative;margin-bottom:12px">'+
    '<div style="display:flex;align-items:center;gap:8px">'+
    '<div style="flex:1"><div style="font-size:11px;color:var(--text-3);margin-bottom:3px">De</div>'+
    '<input type="text" id="sexp-start" placeholder="DD/MM/AAAA" maxlength="10" value="'+fmtInput(_subsExp.start)+'" oninput="_subsExpInput(\'start\',this.value)" onfocus="_subsExpOpen(\'start\')" style="'+inputStyle+'"></div>'+
    '<div style="padding-top:18px;color:var(--text-3)">→</div>'+
    '<div style="flex:1"><div style="font-size:11px;color:var(--text-3);margin-bottom:3px">Até</div>'+
    '<input type="text" id="sexp-end" placeholder="DD/MM/AAAA" maxlength="10" value="'+fmtInput(_subsExp.end)+'" oninput="_subsExpInput(\'end\',this.value)" onfocus="_subsExpOpen(\'end\')" style="'+inputStyle+'"></div>'+
    '</div>'+
    '<div id="sexp-cal" style="display:none;position:absolute;left:0;right:0;top:100%;z-index:200;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r-sm);box-shadow:0 4px 16px rgba(0,0,0,.12);padding:12px;margin-top:4px"></div>'+
    '</div>';
  _subsExpRenderCal();
}

function _subsExpRenderCal(){
  var cal=document.getElementById('sexp-cal');
  if(!cal)return;
  if(!_subsExp.calOpen){cal.style.display='none';return;}
  cal.style.display='block';
  var y=_subsExp.calYear,m=_subsExp.calMonth;
  var firstDay=new Date(y,m,1);
  var dowFirst=firstDay.getDay();
  var backDays=dowFirst===0?6:dowFirst-1;
  var start=new Date(firstDay);start.setDate(start.getDate()-backDays);
  var days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  var grid='<div style="display:grid;grid-template-columns:repeat(7,1fr)">';
  days.forEach(function(d){grid+='<div style="text-align:center;font-size:10px;font-weight:600;color:var(--text-3);padding:3px 0">'+d+'</div>';});
  var cur=new Date(start);
  for(var row=0;row<6;row++){
    var hasMonth=false;
    var tmp=new Date(cur);
    for(var col=0;col<7;col++){if(tmp.getMonth()===m)hasMonth=true;tmp.setDate(tmp.getDate()+1);}
    if(!hasMonth)break;
    for(var c=0;c<7;c++){
      var ds=fmt(cur);
      var inMonth=cur.getMonth()===m;
      var isStart=ds===_subsExp.start;
      var isEnd=ds===_subsExp.end;
      var rangeEnd=_subsExp.end||((_subsExp.start&&_subsExp.hover&&!_subsExp.end)?_subsExp.hover:null);
      var inRange=_subsExp.start&&rangeEnd&&ds>_subsExp.start&&ds<rangeEnd;
      var isEdge=isStart||isEnd;
      // Cell background: range tint for in-range days; transparent otherwise
      var cellBg=inRange?'rgba(26,26,24,0.07)':'transparent';
      // Round the left edge of range at start, right edge at end
      var cellRadius=isStart?'50% 0 0 50%':isEnd?'0 50% 50% 0':'0';
      // Inner circle for start/end days
      var dotBg=isEdge?'var(--accent)':'transparent';
      var dotColor=isEdge?'#fff':inMonth?'var(--text)':'var(--text-3)';
      var dotFw=isEdge?'600':'400';
      var cursor=inMonth?'pointer':'default';
      grid+='<div style="background:'+cellBg+';border-radius:'+cellRadius+';padding:2px 0;display:flex;align-items:center;justify-content:center;cursor:'+cursor+'"'+
        (inMonth?' onmouseover="_subsExpHover(\''+ds+'\')" onmouseout="_subsExpHover(null)" onmousedown="event.preventDefault();_subsExpClick(\''+ds+'\')"':'')+
        '><div style="width:26px;height:26px;border-radius:50%;background:'+dotBg+';color:'+dotColor+';font-weight:'+dotFw+';font-size:12px;display:flex;align-items:center;justify-content:center">'+cur.getDate()+'</div></div>';
      cur.setDate(cur.getDate()+1);
    }
  }
  grid+='</div>';
  cal.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<button onmousedown="event.preventDefault();_subsExpNav(-1)" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-2);padding:2px 8px">&#8592;</button>'+
    '<span style="font-size:13px;font-weight:600">'+MONTHS_PT[m]+' '+y+'</span>'+
    '<button onmousedown="event.preventDefault();_subsExpNav(1)" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-2);padding:2px 8px">&#8594;</button>'+
    '</div>'+grid;
}

function _subsExpOpen(field){
  var ref=field==='end'&&_subsExp.end?_subsExp.end:(_subsExp.start||null);
  if(ref){var d=new Date(ref+'T00:00:00');_subsExp.calYear=d.getFullYear();_subsExp.calMonth=d.getMonth();}
  _subsExp.calOpen=true;
  _subsExpRenderCal();
}

function _subsExpNav(dir){
  _subsExp.calMonth+=dir;
  if(_subsExp.calMonth>11){_subsExp.calMonth=0;_subsExp.calYear++;}
  if(_subsExp.calMonth<0){_subsExp.calMonth=11;_subsExp.calYear--;}
  _subsExpRenderCal();
}

function _subsExpHover(ds){
  if(_subsExp.start&&!_subsExp.end){_subsExp.hover=ds;_subsExpRenderCal();}
}

function _subsExpClick(ds){
  if(!_subsExp.start||(_subsExp.start&&_subsExp.end)){
    _subsExp.start=ds;_subsExp.end=null;_subsExp.hover=null;
  }else{
    if(ds<_subsExp.start){_subsExp.end=_subsExp.start;_subsExp.start=ds;}
    else{_subsExp.end=ds;}
    _subsExp.hover=null;
    _subsExp.calOpen=false;
  }
  _subsExpRenderCal();
  var fi=function(d){return d?d.slice(8,10)+'/'+d.slice(5,7)+'/'+d.slice(0,4):'';};
  var s=document.getElementById('sexp-start');if(s)s.value=fi(_subsExp.start);
  var e=document.getElementById('sexp-end');if(e)e.value=fi(_subsExp.end);
}

function _subsExpInput(field,val){
  var match=val.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(match){
    var ds=match[3]+'-'+match[2]+'-'+match[1];
    var d=new Date(ds+'T00:00:00');
    if(!isNaN(d)){
      _subsExp[field]=ds;
      _subsExp.calYear=d.getFullYear();
      _subsExp.calMonth=d.getMonth();
      _subsExpRenderCal();
    }
  }
}

function selectDay(ds){
  var year=parseInt(ds.slice(0,4));
  var vacNames=(buildDayMap(year)[ds])||[];
  var allAbsNames=(buildAllAbsenceMap(year)[ds])||[];
  var licNames=allAbsNames.filter(function(n){return vacNames.indexOf(n)<0;});
  // Recesso: check current year and previous year (ano_novo can span Dec→Jan)
  var recMap=buildRecessoDayMap(year);
  var recMapPrev=buildRecessoDayMap(year-1);
  var recNames=(recMap[ds]||[]).concat((recMapPrev[ds]||[]));
  var el=document.getElementById('sel-info');if(!el)return;
  var d=parseD(ds);
  var opts={weekday:'long',day:'numeric',month:'long',year:'numeric'};
  var str=d.toLocaleDateString('pt-BR',opts);
  var hol=getHoliday(ds);
  var lines=[];
  lines.push('<div style="font-weight:600">'+str+'</div>');
  if(hol){
    var holLabel=hol.type==='holiday'?'Feriado':hol.type==='optional'?'Ponto facultativo':'Suspensão de expediente';
    var holText=hol.type==='suspended'?holLabel:holLabel+': '+hol.label;
    lines.push('<div><span style="font-size:11px;font-weight:500;background:#f3eeff;color:#7c3aed;border:1px solid #c4b5fd;padding:2px 8px;border-radius:4px;display:inline-block">'+holText+'</span></div>');
  }
  var hasAny=vacNames.length||licNames.length||recNames.length;
  if(!hasAny){
    lines.push('<div style="color:var(--text-3);font-size:12px">Nenhum procurador ausente.</div>');
  }else{
    if(vacNames.length){
      var over=vacNames.length>LIMIT,atLim=vacNames.length===LIMIT;
      var limitBadge=over?' <span style="color:var(--red);font-weight:600">&#9888; Limite ultrapassado!</span>':atLim?' <span style="color:var(--amber);font-weight:500">&#9888; Limite atingido</span>':'';
      var nameLinks=vacNames.map(function(n){
        return '<a href="#" onclick="event.preventDefault();setView(\'people\');setTimeout(function(){showPersonVacs(\''+n+'\');},80)" style="color:var(--text);text-decoration:underline;text-decoration-color:var(--border-md);font-weight:500">'+n+'</a>';
      }).join(', ');
      lines.push('<div style="font-size:12px"><span style="color:var(--text-3)">Férias:</span> '+nameLinks+limitBadge+'</div>');
    }
    if(licNames.length){
      var licLinks=licNames.map(function(n){
        var lt='';
        vacations.forEach(function(v){if(v.n===n&&isLicense(v)){var vs=new Date(v.s+'T00:00:00'),ve=new Date(fmt(addDays(v.s,v.d-1))+'T00:00:00'),td=new Date(ds+'T00:00:00');if(vs<=td&&td<=ve)lt=licenseLabel(v.type);}});
        return '<a href="#" onclick="event.preventDefault();setView(\'licenses\')" style="color:var(--text);text-decoration:underline;text-decoration-color:var(--border-md);font-weight:500">'+n+'</a>'+(lt?' <span style="color:var(--text-3);font-size:11px">('+lt+')</span>':'');
      }).join(', ');
      lines.push('<div style="font-size:12px"><span style="color:var(--text-3)">Licença:</span> '+licLinks+'</div>');
    }
    if(recNames.length){
      var recLinks=recNames.map(function(n){return '<span style="font-weight:500">'+n+'</span>';}).join(', ');
      lines.push('<div style="font-size:12px"><span style="color:var(--text-3)">Recesso:</span> '+recLinks+'</div>');
    }
  }
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:6px">'+lines.join('')+'</div>';
}

function buildCal(year,month){
  var firstDayRaw=new Date(year,month,1).getDay(); // 0=Sun
  var firstDay=firstDayRaw; // Sun=0, already correct
  var dim=new Date(year,month+1,0).getDate();
  var dm=buildDayMap(year);
  var allAbsMap=buildAllAbsenceMap(year);
  var recMap=buildRecessoDayMap(year);
  var recMapPrev=buildRecessoDayMap(year-1);
  var recDateSet=buildRecessoDateSet(year);
  var recDateSetPrev=buildRecessoDateSet(year-1);
  var h='<div class="cal-head">'+['Dom','Seg','Ter','Qua','Qui','Sex','Sab'].map(function(d){return '<span>'+d+'</span>';}).join('')+'</div><div class="cal-body">';
  for(var i=0;i<firstDay;i++)h+='<div class="day empty"></div>';
  for(var d=1;d<=dim;d++){
    var ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var ns=dm[ds]||[],c=ns.length,isT=ds===today,over=c>LIMIT;
    var allNs=allAbsMap[ds]||[];
    var hasLic=allNs.some(function(n){return ns.indexOf(n)<0;});
    var hasRec=recDateSet[ds]||recDateSetPrev[ds]||false;
    var bc=c===0?'':over?'cbover':'cb'+Math.min(c,4);
    var hol=getHoliday(ds);
    var dow=new Date(year,month,d).getDay();
    var isWeekend=(dow===0||dow===6);
    // Check if this day is in preview
    var inPreview=false,previewConflict=false;
    if(previewVac){
      for(var pi=0;pi<previewVac.d;pi++){
        if(fmt(addDays(previewVac.s,pi))===ds){
          inPreview=true;
          // Conflict if existing count >= LIMIT
          if((ns.length)>=LIMIT)previewConflict=true;
          break;
        }
      }
    }
    var dayCls='day'+(isT?' today':'')+(hol?' has-hol':'')+(isWeekend?' weekend':'')+(inPreview?(previewConflict?' day-preview-conflict':' day-preview'):'')+(hasRec?' rec-day':'');
    if(calHighlightPeriod){var _hlEnd=fmt(addDays(calHighlightPeriod.s,calHighlightPeriod.d-1));if(ds>=calHighlightPeriod.s&&ds<=_hlEnd)dayCls+=' search-match';}
    h+='<div class="'+dayCls+'" data-date="'+ds+'" onclick="selectDay(\''+ds+'\')">';
    h+='<div class="dn">'+d+'</div>';
    h+='<div class="day-content">';
    if(c>0||hasLic){
      var licNs=hasLic?allNs.filter(function(n){return ns.indexOf(n)<0;}):[];
      var nameParts=ns.slice();
      licNs.forEach(function(n){nameParts.push('<span style="color:#2563eb">'+n+'</span>');});
      if(c>0)h+='<div class="cbadge '+bc+'">'+c+(over?' !':'')+'</div>';
      else h+='<div class="cbadge" style="visibility:hidden">0</div>';
      h+='<div class="dnames">'+nameParts.join(', ')+'</div>';
    }
    h+='</div></div>';
  }
  return h+'</div>';
}

// ── Gantt ──────────────────────────────────────────────────────────────────────
function buildGantt(year){
  var isLeap=year%4===0,total=isLeap?366:365;
  var start=new Date(year,0,1);
  var dm=buildDayMap(year);
  var yv=vacations.filter(function(v){
    var ys=parseInt(v.s.slice(0,4)),ye=parseInt(fmt(addDays(v.s,v.d-1)).slice(0,4));
    return ys===year||ye===year;
  });
  var ap=[];
  yv.forEach(function(v){if(ap.indexOf(v.n)<0)ap.push(v.n);});ap.sort();
  var h='<div class="gantt-inner">';
  h+='<div class="mr"><div class="mr-sp"></div><div style="flex:1;display:flex">';
  MONTHS_PT.forEach(function(_,i){var mo=new Date(year,i+1,0).getDate();h+='<div class="mr-m" style="width:'+(mo/total*100).toFixed(2)+'%">'+MONTHS_PT[i].slice(0,3)+'</div>';});
  h+='</div></div>';
  if(!ap.length)h+='<div style="font-size:13px;color:var(--text-3);padding:8px 0">Nenhuma férias cadastrada para este ano.</div>';
  ap.forEach(function(p){
    h+='<div class="gantt-row"><div class="gname">'+p+'</div><div class="gtrack">';
    yv.filter(function(v){return v.n===p;}).forEach(function(v){
      var s=parseD(v.s),e=addDays(v.s,v.d-1);
      var sc=s<start?start:s,ec=e>new Date(year,11,31)?new Date(year,11,31):e;
      var off=((sc-start)/86400000)/total*100,w=((ec-sc)/86400000+1)/total*100;
      var startMonth=parseD(v.s).getMonth();
      var startYear=parseInt(v.s.slice(0,4));
      h+='<div class="gbar" onclick="showGanttBar(\''+p+'\',\''+v.s+'\','+v.d+','+startYear+','+startMonth+')" style="left:'+off.toFixed(2)+'%;width:'+w.toFixed(2)+'%;background:'+pColor(p)+';cursor:pointer"></div>';
    });
    h+='</div></div>';
  });
  h+='<div style="height:6px"></div>';
  h+='<div class="gantt-row"><div class="gname" style="font-size:10px;color:var(--text-3)">Ocupação</div><div class="gtrack" style="height:20px">';
  for(var d=0;d<total;d++){
    var dt=new Date(year,0,1+d),k=fmt(dt),c=(dm[k]||[]).length;
    if(!c)continue;
    var over=c>LIMIT,col=c===1?'#10b981':c===2?'#3b82f6':c===3?'#fbbf24':(!over?'#f59e0b':'#dc2626');
    h+='<div style="position:absolute;left:'+(d/total*100).toFixed(3)+'%;width:calc('+(1/total*100).toFixed(3)+'% + 1px);height:100%;background:'+col+';opacity:.85"></div>';
  }
  h+='</div></div></div>';
  return h;
}

// ── Conflicts ──────────────────────────────────────────────────────────────────
function buildConflictsView(year){
  var dm=buildDayMap(year);
  var cDays=Object.keys(dm).filter(function(k){return dm[k].length>LIMIT;}).sort();
  var cDaysFull=cDays.map(function(k){return{ds:k,ns:dm[k]};});
  if(!cDays.length){
    return '<div class="conflicts-wrap"><div class="conflict-empty">'+
      '<div class="conflict-ok-icon">&#10003;</div>'+
      '<div class="conflict-empty-title">Nenhum conflito em '+year+'</div>'+
      '<div class="conflict-empty-sub">Todos os períodos respeitam o limite de '+LIMIT+' férias simultâneas.</div>'+
      '</div></div>';
  }
  var byMonth={};
  cDaysFull.forEach(function(x){var m=parseInt(x.ds.slice(5,7))-1;if(!byMonth[m])byMonth[m]=[];byMonth[m].push(x);});
  var maxStreak=1,streak=1;
  for(var i=1;i<cDays.length;i++){
    var prev=parseD(cDays[i-1]),curr=parseD(cDays[i]);
    streak=((curr-prev)/86400000===1)?streak+1:1;
    if(streak>maxStreak)maxStreak=streak;
  }
  var cPeople=[];
  cDaysFull.forEach(function(x){x.ns.forEach(function(n){if(cPeople.indexOf(n)<0)cPeople.push(n);});});
  cPeople.sort();
  var h='<div class="conflicts-wrap">';
  h+='<div class="conflict-summary-bar">'+
    '<div class="csb-item"><span class="csb-val">'+cDays.length+'</span> dia'+(cDays.length>1?'s':'')+' com conflito</div>'+
    '<div class="csb-item" style="opacity:.4">&#183;</div>'+
    '<div class="csb-item"><span class="csb-val">'+Object.keys(byMonth).length+'</span> '+(Object.keys(byMonth).length>1?'meses afetados':'mês afetado')+'</div>'+
    '<div class="csb-item" style="opacity:.4">&#183;</div>'+
    '<div class="csb-item">Sequência máxima: <span class="csb-val">'+maxStreak+' dia'+(maxStreak>1?'s':'')+' seguidos</span></div>'+
    '<div class="csb-item" style="opacity:.4">&#183;</div>'+
    '<div class="csb-item"><span class="csb-val">'+cPeople.length+'</span> procurador'+(cPeople.length>1?'es':'')+' envolvido'+(cPeople.length>1?'s':'')+'</div>'+
    '</div>';
  Object.keys(byMonth).sort().forEach(function(m){
    var days=byMonth[m];
    h+='<div class="conflict-month-block">';
    h+='<div class="conflict-month-title">'+MONTHS_PT[parseInt(m)]+' '+year+' &mdash; '+days.length+' dia'+(days.length>1?'s':'')+'</div>';
    days.forEach(function(x){
      var d=parseD(x.ds);
      var extra=x.ns.length-LIMIT;
      h+='<div class="conflict-item">'+
        '<div class="conflict-date-col">'+
        '<div class="conflict-day-num">'+d.getDate()+'</div>'+
        '<div class="conflict-weekday">'+d.toLocaleDateString('pt-BR',{weekday:'long'})+'</div>'+
        '</div>'+
        '<div class="conflict-body">'+
        '<div class="conflict-count-badge">&#9888; '+x.ns.length+' procuradores ausentes &middot; '+extra+' acima do limite de '+LIMIT+'</div>'+
        '<div class="conflict-names">'+
        x.ns.map(function(n){return '<div class="conflict-name-chip" onclick="showPersonVacs(\''+n+'\')"><div class="conflict-dot" style="background:'+pColor(n)+'"></div>'+n+'</div>';}).join('')+
        '</div></div></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

      }

function buildPanel(year){
  var dm=buildDayMap(year);
  var st=getStats(year);
  var active=activePeopleForYear(year);
  var now=new Date();
  var apSet={};Object.keys(dm).forEach(function(k){dm[k].forEach(function(n){apSet[n]=1;});});
  var ap=Object.keys(apSet).length;

  var h='';

  // ── Situação Operacional (master + ano atual) ──
  if(year===now.getFullYear()){
    var todayStr=fmt(now);
    var todayD=new Date(todayStr+'T00:00:00');
    var windowEnd=new Date(todayStr+'T00:00:00');
    windowEnd.setDate(windowEnd.getDate()+30);
    var windowEndStr=fmt(windowEnd);

    var onVacToday=dm[todayStr]||[];
    var allAbsToday=buildAllAbsenceMap(year)[todayStr]||[];
    var recToday=(buildRecessoDayMap(year)[todayStr]||[]).concat(buildRecessoDayMap(year-1)[todayStr]||[]);
    var foraDistNow=[],bancaNow=[],startsToday=[],returnsToday=[];
    var distToday=[],bancaToday=[];
    var distEvents=[],bancaEvents=[];
    var seen={dist:{},banca:{}};

    vacations.forEach(function(v){
      var vEndStr=fmt(addDays(v.s,v.d-1));
      var vEndD=new Date(vEndStr+'T00:00:00');
      var vStartD=new Date(v.s+'T00:00:00');

      if(v.s===todayStr)startsToday.push({n:v.n,start:v.s,end:vEndStr});
      var retD=new Date(vEndStr+'T00:00:00');retD.setDate(retD.getDate()+1);
      if(fmt(retD)===todayStr)returnsToday.push({n:v.n,start:v.s,end:vEndStr});

      // Saída da distribuição — férias (7 dias antes), licenças (a partir do 1º dia)
      var distD=new Date(vStartD);if(!isLicense(v))distD.setDate(distD.getDate()-7);
      var distStr=fmt(distD);
      if(distStr<=todayStr&&vEndStr>=todayStr)foraDistNow.push({n:v.n,start:v.s,end:vEndStr,started:v.s<=todayStr,type:v.type});
      if(distStr===todayStr&&!seen.dist[v.n+distStr]){seen.dist[v.n+distStr]=true;distToday.push({n:v.n,start:v.s,end:vEndStr,type:v.type});}
      if(distStr>todayStr&&distStr<=windowEndStr&&!seen.dist[v.n+distStr]){seen.dist[v.n+distStr]=true;distEvents.push({n:v.n,date:distStr,start:v.s,end:vEndStr,type:v.type});}
      // Banca rodando — férias (2 dias úteis antes) e licenças (a partir do 1º dia)
      var bancaStr=isLicense(v)?v.s:subtractWorkDays(v.s,2);
      if(bancaStr<=todayStr&&vEndStr>=todayStr)bancaNow.push({n:v.n,start:v.s,end:vEndStr,started:v.s<=todayStr,type:v.type});
      if(bancaStr===todayStr&&!seen.banca[v.n+bancaStr]){seen.banca[v.n+bancaStr]=true;bancaToday.push({n:v.n,start:v.s,end:vEndStr,type:v.type});}
      if(bancaStr>todayStr&&bancaStr<=windowEndStr&&!seen.banca[v.n+bancaStr]){seen.banca[v.n+bancaStr]=true;bancaEvents.push({n:v.n,date:bancaStr,start:v.s,end:vEndStr,type:v.type});}
    });

    distEvents.sort(function(a,b){return a.date.localeCompare(b.date);});
    bancaEvents.sort(function(a,b){return a.date.localeCompare(b.date);});

    var todayFmt=new Date(todayStr+'T00:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'long'});

    h+='<div style="background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r-sm);padding:16px;margin-bottom:24px">';
    h+='<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:12px">Situação operacional · '+todayFmt+'</div>';

    // Três blocos: de férias / fora da dist / banca rodando
    h+='<div class="op-grid">';

    // Bloco 1 — Ausentes agora (férias + licenças + recesso)
    var allPresentToday=allAbsToday.concat(recToday.filter(function(n){return allAbsToday.indexOf(n)<0;}));
    h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px">';
    h+='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px">Ausentes agora</div>';
    if(allPresentToday.length){
      h+=allPresentToday.map(function(n){
        var ret='',badge='';
        if(recToday.indexOf(n)>=0){badge='<span style="font-size:10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:0 5px;border-radius:3px;margin-left:4px">Recesso</span>';}
        vacations.forEach(function(v){
          if(v.n!==n)return;
          var vs=new Date(v.s+'T00:00:00'),ve=new Date(fmt(addDays(v.s,v.d-1))+'T00:00:00');
          if(vs<=todayD&&todayD<=ve){

    h+='</div>';

    // Bloco 2 — Fora da distribuição agora

    h+='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px">Fora da distribuição</div>';
    if(foraDistNow.length){
      h+=foraDistNow.map(function(e){
        var lbl=e.type&&e.type!=='ferias'?licenseLabel(e.type):'férias';
        return '<div style="font-size:12px;line-height:1.6"><strong>'+e.n+'</strong> <span style="color:var(--text-3);font-size:11px">('+lbl+' '+fmtBR(e.start)+' → '+fmtBR(e.end)+')</span></div>';

    }else{
      h+='<div style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:2px">Nenhum fora da distribuição</div>';
      h+='<div style="font-size:11px;color:var(--text-3)">Nenhum procurador saiu da distribuição hoje.</div>';
    }
    h+='</div>';

    // Bloco 3 — Banca rodando agora
    h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px">';
    h+='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px">Banca rodando</div>';
    if(bancaNow.length){
      h+=bancaNow.map(function(e){
        var lbl=e.type&&e.type!=='ferias'?licenseLabel(e.type):'férias';
        return '<div style="font-size:12px;line-height:1.6"><strong>'+e.n+'</strong> <span style="color:var(--text-3);font-size:11px">('+lbl+' '+fmtBR(e.start)+' → '+fmtBR(e.end)+')</span></div>';
      }).join('');
    }else{
      h+='<div style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:2px">Nenhuma banca ativa hoje</div>';
      h+='<div style="font-size:11px;color:var(--text-3)">Nenhuma banca em rodagem no momento.</div>';
    }
    h+='</div>';

    h+='</div>'; // end grid

    // Bloco 4 — Substituições do dia

    var subsToday=Object.keys(todaySubMap).filter(function(k){return k!=='_m';}).map(function(absent){return {absent:absent,sub:todaySubMap[absent]};}).sort(function(a,b){return a.absent.localeCompare(b.absent);});

    h+='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px">Substituições do dia</div>';
    if(subsToday.length){
      h+='<div style="font-size:12px">';
      h+=subsToday.map(function(x){
        var subLabel=x.sub?'<strong>'+x.sub+'</strong>':'<span style="color:var(--amber);font-size:11px">não definido</span>';
        return '<span><strong>'+x.absent+'</strong> <span style="color:var(--text-3)">&#8594;</span> '+subLabel+'</span>';
      }).join('<span style="color:var(--text-3);padding:0 8px">&middot;</span>');
      h+='</div>';
    }else{
      h+='<div style="font-size:12px;color:var(--text-3)">Nenhuma substituição necessária.</div>';
    }
    h+='</div>';

    // Hoje
    var hasToday=returnsToday.length||startsToday.length||distToday.length||bancaToday.length;
    if(hasToday){
      h+='<div style="border-top:1px solid var(--border);padding-top:10px">';
      h+='<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:6px">Hoje</div>';
      function todayEvLine(label,arr){

        h+='<div style="font-size:12px;margin-bottom:3px"><span style="color:var(--text-2)">'+label+':</span> ';

  h+='<div class="card">';

  h+='<div class="card-val">'+st.daysWithVac+'</div>';
  h+='<div class="card-sub">dias com ao menos 1 procurador de férias</div>';
  h+='</div>';

  h+='</div>';

  // ── Heatmap mensal compacto ──
  h+='<div style="margin-bottom:28px">';
  h+='<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:10px">Pico de férias por mês — '+year+'</div>';
  h+='<div style="display:flex;gap:4px;align-items:flex-end">';
  MONTHS_PT.forEach(function(mName,mi){
    var maxInMonth=0;
    var daysInMonth=new Date(year,mi+1,0).getDate();
    for(var d=1;d<=daysInMonth;d++){
      var k=year+'-'+String(mi+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var cnt=dm[k]?dm[k].length:0;
      if(cnt>maxInMonth)maxInMonth=cnt;
    }

    h+='</div>';
  });
  h+='</div></div>';


  return h;
}

function isWorkDayForBanca(ds){
  var d=new Date(ds+'T00:00:00');
  var dow=d.getDay();
  if(dow===0||dow===6)return false;
  var hol=getHoliday(ds);
  if(!hol)return true;
  if(hol.type==='holiday'||hol.type==='suspended')return false;
  if(hol.type==='optional'){
    // Quarta-feira de Cinzas é opcional mas conta como útil
    if(hol.label&&hol.label.indexOf('Cinzas')>=0)return true;
    return false;
  }
  return true;
}

function subtractWorkDays(startDs,n){
  var ds=startDs;
  var count=0;
  while(count<n){
    var d=new Date(ds+'T00:00:00');
    d.setDate(d.getDate()-1);
    ds=fmt(d);
    if(isWorkDayForBanca(ds))count++;
  }
  return ds;
}

    '<div class="field"><label>Data</label><input type="date" id="ch-date"></div>'+

    '<div class="field"><label>Tipo</label><select id="ch-type">'+typeOpts+'</select></div>',

}
window.removeCustomHoliday=function(date){
  customHolidays=customHolidays.filter(function(h){return h.date!==date;});
  saveConfig();render();showCustomHolidaysModal();
};
function addCustomHoliday(){
  var date=document.getElementById('ch-date').value;
  var label=(document.getElementById('ch-label').value||'').trim();
  var type=document.getElementById('ch-type').value;
  if(!date||!label){alert('Preencha todos os campos.');return;}
  if(customHolidays.find(function(h){return h.date===date;})){alert('Esta data já está cadastrada.');return;}
  customHolidays.push({date:date,label:label,type:type});
  customHolidays.sort(function(a,b){return a.date.localeCompare(b.date);});
  saveConfig();render();showCustomHolidaysModal();
}

function render(){

    h+='<div class="preview-banner-sub">'+pvStart+' → '+pvEnd+' &middot; '+previewVac.d+' dias &middot; Amarelo: período testado. Vermelho: dia com mais de '+LIMIT+' férias simultâneas.</div>';

  h+='</div>';

  if(currentAdminUser&&currentAdminUser!=='ADMIN'&&!previewVac&&!_welcomeDismissed){

  // Panel

    h+=buildPanel(curYear);

  // Calendar
  if(curView==='calendar'){
    var mStatus=mOver>0?'<span style="color:var(--red)">'+mOver+' '+(mOver===1?'dia':'dias')+' acima do limite</span>':mAt4>0?'<span style="color:var(--amber)">'+mAt4+' '+(mAt4===1?'dia':'dias')+' no limite</span>':'&#10003; Nenhum dia acima do limite neste mês';
    h+='<div class="month-nav">';

    if(_calReturnPerson)h+='<button class="btn sm primary" style="margin-left:auto;white-space:nowrap" onclick="var p=_calReturnPerson;_calReturnPerson=null;if(_calReturnTimer){clearTimeout(_calReturnTimer);_calReturnTimer=null;}setView(\'people\');setTimeout(function(){showPersonVacs(p);},80)">&#8592; Retornar para as férias de '+_calReturnPerson+'</button>';

function goToCalendarDate(year,month,vacStart,vacDays,hlDuration){
  curYear=year;curMonth=month;curView='calendar';_pushViewState('calendar');render();
  // Scroll to calendar on mobile
  setTimeout(function(){
    var nav=document.querySelector('.month-nav');
    if(nav){var top=nav.getBoundingClientRect().top+window.pageYOffset-135;window.scrollTo({top:top,behavior:'smooth'});}
  },60);
  if(!vacStart||!vacDays)return;
  var holdMs=hlDuration||2200;
  setTimeout(function(){
    var cells=document.querySelectorAll('.day[data-date]');
    var toHL=[];
    for(var i=0;i<vacDays;i++){toHL.push(fmt(addDays(vacStart,i)));}
    var hlCells=[];
    cells.forEach(function(el){
      if(toHL.indexOf(el.dataset.date)>=0){hlCells.push(el);}
    });
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        hlCells.forEach(function(el){el.classList.add('hl-vac');});
        // Show legend entry
        if(_calReturnPerson){
          _hlLegendPerson=_calReturnPerson;
          var leg=document.getElementById('_hl-leg');
          var legTxt=document.getElementById('_hl-leg-text');
          if(leg){leg.style.display='flex';}
          if(legTxt){legTxt.textContent='Férias de '+_hlLegendPerson;}
        }
        setTimeout(function(){
          hlCells.forEach(function(el){
            el.classList.remove('hl-vac');
            el.classList.add('hl-vac-out');
          });
          setTimeout(function(){
            hlCells.forEach(function(el){el.classList.remove('hl-vac-out');});
            // Hide legend entry
            _hlLegendPerson=null;
            var leg=document.getElementById('_hl-leg');
            if(leg)leg.style.display='none';
          },1100);
        },holdMs);
      });
    });
  },60);
}
function prevM(){if(curMonth>0)curMonth--;else if(curYear>YEARS[0]){curYear--;curMonth=11;}render();}
function nextM(){if(curMonth<11)curMonth++;else if(curYear<YEARS[YEARS.length-1]){curYear++;curMonth=0;}render();}

// ── Boot ───────────────────────────────────────────────────────────────────────
function bootDashboard(user){
  if(user)currentAdminUser=user==='VIEWER'?null:user;
  document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div style="font-size:14px;color:var(--text-3)">Conectando...</div></div>';
  loadOfficial(function(){
    applyData(officialData);
    // Re-validate user — match ignoring accents so MARILIA matches MÁRILIA etc.
    if(currentAdminUser&&currentAdminUser!=='ADMIN'){
      var normalize=function(s){return s.normalize?s.normalize('NFD').replace(/[\u0300-\u036f]/g,''):s;};
      var normUser=normalize(currentAdminUser);
      var matched=getAdminPasswords().find(function(p){return normalize(p)===normUser;});
      if(matched){currentAdminUser=matched;}else{currentAdminUser=null;}
    }
    loadConfig(function(){
      loadRecesso(function(){
        render();
        window.scrollTo(0,0);
        subscribeOfficial();
        subscribeRecesso();
        subscribeSubs();
      });
    });
  });
}

// Login events
document.getElementById('login-btn').addEventListener('click',checkLogin);
document.getElementById('login-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkLogin();});

var _storedUser=sessionStorage.getItem(SESSION_KEY);
if(_storedUser){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='';
  bootDashboard(_storedUser);
}else{
  document.getElementById('login-input').focus();
}
</script>
